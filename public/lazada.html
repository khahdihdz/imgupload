<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazada Affiliate – Chuyển đổi link</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
/* Lazada page — override accent to orange */
:root {
  --accent:  #f0a030;
  --accent2: #ff6b35;
}
body::before {
  background-image:
    linear-gradient(rgba(240,160,48,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(240,160,48,.03) 1px, transparent 1px);
}
.toast-box { background: #1a1508; border-color: #7a5a1e; color: #ffcc80; }
</style>
</head>
<body>
<div class="wrapper">

<!-- HEADER -->
<header>
  <div class="logo-hex">L</div>
  <div class="logo-name">Lazada <em>Affiliate</em></div>
  <span class="badge-v">v4.0</span>
  <nav class="hdr-nav">
    <a href="/index.html"       class="nav-btn">🖼 <span class="nav-text">WaterMark</span></a>
    <a href="/lazada.html"      class="nav-btn active">🔗 <span class="nav-text">Lazada</span></a>
    <a href="/filemanager.html" class="nav-btn">📁 <span class="nav-text">File Manager</span></a>
  </nav>
</header>

<!-- MAIN -->
<div class="main">

  <!-- STEP 1 — CONNECT -->
  <div class="step">01 / Kết nối API</div>
  <div class="cc">
    <div class="connect-row">
      <div class="connect-info">
        <h6>Lazada OpenAPI</h6>
        <p>Credentials cấu hình qua <strong style="color:var(--text)">Environment Variables</strong> trên Render</p>
      </div>
      <button class="btn-sm" id="btnTest" onclick="testToken()">🔌 Test kết nối</button>
    </div>
    <div class="status-box" id="statusBox"></div>
  </div>

  <!-- STEP 2 — INPUT -->
  <div class="step">02 / Nhập link Lazada</div>

  <div class="tip-box">
    💡 Mỗi dòng một URL &nbsp;·&nbsp; Tối đa <strong>50 link</strong> mỗi lần &nbsp;·&nbsp; Hỗ trợ link sản phẩm, shop, campaign
  </div>

  <div class="cc">
    <textarea class="ta" id="urlInput" rows="7"
      placeholder="https://www.lazada.vn/products/...
https://www.lazada.vn/shop/...
https://s.lazada.vn/s.xxxxxxxx"></textarea>
    <div class="url-counter" id="urlCounter">0 URL</div>

    <div class="action-row">
      <button class="btn-g" id="btnConvert" onclick="convertLinks()">⚡ Chuyển đổi Affiliate</button>
      <button class="btn-sm" onclick="pasteClipboard()">📋 Dán</button>
      <button class="btn-sm" onclick="clearAll()">↺ Xoá</button>
    </div>

    <div class="prog-wrap" id="progWrap">
      <div class="prog-label">
        <span id="progText">Đang xử lý…</span>
        <span id="progCount"></span>
      </div>
      <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-head">
      <div class="result-title" id="resultTitle">Kết quả</div>
      <div class="result-actions">
        <button class="btn-sm" onclick="copyAllAff()">📋 Copy tất cả affiliate</button>
        <button class="btn-sm" onclick="copyAllShort()">📋 Copy tất cả short link</button>
      </div>
    </div>
    <div class="result-list" id="resultList"></div>
  </div>

</div><!-- /main -->
</div><!-- /wrapper -->

<div class="toast-box" id="toast"></div>

<script>
let lastResults = [];

/* ── COUNTER ── */
document.getElementById('urlInput').addEventListener('input', updateCounter);
function updateCounter() {
  const n = getUrls().length;
  document.getElementById('urlCounter').textContent = `${n} URL`;
}
function getUrls() {
  return document.getElementById('urlInput').value
    .split('\n').map(l => l.trim())
    .filter(l => l.startsWith('http://') || l.startsWith('https://'));
}

/* ── TEST TOKEN ── */
async function testToken() {
  const btn = document.getElementById('btnTest');
  btn.textContent = '⏳…'; btn.disabled = true;
  setStatus('info', '⏳ Đang kiểm tra kết nối Lazada…');
  try {
    const res  = await fetch('/api/lazada/status');
    const json = await safeJson(res);
    if (json.ok) {
      setStatus('ok', json.message || '✅ Kết nối Lazada thành công');
    } else {
      setStatus('err', `❌ ${json.error || 'Token không hợp lệ'}${json.hint ? ' · ' + json.hint : ''}`);
    }
  } catch(e) {
    setStatus('err', `❌ Không kết nối được server: ${e.message}`);
  }
  btn.textContent = '🔌 Test kết nối'; btn.disabled = false;
}

/* ── CONVERT ── */
async function convertLinks() {
  const urls = getUrls();
  if (!urls.length) { toast('⚠️ Chưa nhập URL nào'); return; }

  const btn = document.getElementById('btnConvert');
  btn.disabled = true;
  setStatus('info', `⏳ Đang chuyển đổi ${urls.length} link…`);
  showProgress(urls.length);

  const BATCH = 10;
  const allResults = [];
  let done = 0;

  for (let i = 0; i < urls.length; i += BATCH) {
    const chunk = urls.slice(i, i + BATCH);
    try {
      const res  = await fetch('/api/lazada/convert', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ urls: chunk })
      });
      const json = await safeJson(res);
      if (res.ok && json.results) {
        allResults.push(...json.results);
      } else {
        chunk.forEach(u => allResults.push({ original: u, error: json.error || 'Lỗi không xác định' }));
      }
    } catch(e) {
      chunk.forEach(u => allResults.push({ original: u, error: e.message }));
    }
    done += chunk.length;
    updateProgress(done, urls.length);
  }

  lastResults = allResults;
  renderResults(allResults);
  btn.disabled = false;

  const errCount = allResults.filter(r => r.error).length;
  const okCount  = allResults.length - errCount;
  if (errCount === 0) {
    setStatus('ok', `✅ Đã chuyển đổi ${okCount} link thành công`);
  } else {
    setStatus('err', `⚠️ ${okCount} thành công · ${errCount} thất bại`);
  }
}

/* ── RENDER ── */
function renderResults(results) {
  const wrap  = document.getElementById('resultWrap');
  const list  = document.getElementById('resultList');
  const title = document.getElementById('resultTitle');

  const ok  = results.filter(r => !r.error).length;
  const err = results.filter(r =>  r.error).length;
  title.textContent = `Kết quả · ${ok} thành công${err ? ` · ${err} lỗi` : ''}`;

  list.innerHTML = results.map((r, i) => {
    if (r.error) {
      return `<div class="result-item has-err">
        <div class="ri-label">❌ Lỗi · #${i+1}</div>
        <div class="ri-url">${esc(r.original)}</div>
        <div class="ri-err">${esc(r.error)}</div>
      </div>`;
    }
    const hasShort = r.short && r.short !== r.affiliate;
    return `<div class="result-item">
      <div class="ri-label">Link gốc · #${i+1}</div>
      <div class="ri-url">${esc(r.original)}</div>

      <div class="ri-label">🔗 Affiliate URL</div>
      <div class="ri-row">
        <div class="ri-val${r.affiliate ? '' : ' empty'}">
          ${r.affiliate ? `<a href="${esc(r.affiliate)}" target="_blank">${esc(r.affiliate)}</a>` : '—'}
        </div>
        ${r.affiliate ? `<button class="btn-sm" onclick="copyText('${ea(r.affiliate)}',this)">Copy</button>` : ''}
      </div>
      ${hasShort ? `
      <div class="ri-label" style="margin-top:.4rem">⚡ Short link</div>
      <div class="ri-row">
        <div class="ri-val"><a href="${esc(r.short)}" target="_blank">${esc(r.short)}</a></div>
        <button class="btn-sm" onclick="copyText('${ea(r.short)}',this)">Copy</button>
      </div>` : ''}
    </div>`;
  }).join('');

  wrap.classList.add('on');
}

/* ── COPY ── */
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 1600);
  });
}
function copyAllAff() {
  const links = lastResults.filter(r => r.affiliate).map(r => r.affiliate).join('\n');
  if (!links) { toast('⚠️ Chưa có link affiliate'); return; }
  navigator.clipboard.writeText(links).then(() => toast(`✅ Đã copy ${links.split('\n').length} affiliate link`));
}
function copyAllShort() {
  const links = lastResults.filter(r => r.short).map(r => r.short).join('\n');
  if (!links) { toast('⚠️ Chưa có short link'); return; }
  navigator.clipboard.writeText(links).then(() => toast(`✅ Đã copy ${links.split('\n').length} short link`));
}

/* ── PROGRESS ── */
function showProgress(total) {
  document.getElementById('progWrap').classList.add('on');
  document.getElementById('progBar').style.width = '0%';
  document.getElementById('progCount').textContent = `0 / ${total}`;
  document.getElementById('progText').textContent = 'Đang xử lý…';
}
function updateProgress(done, total) {
  document.getElementById('progBar').style.width = Math.round(done/total*100) + '%';
  document.getElementById('progCount').textContent = `${done} / ${total}`;
  if (done === total) document.getElementById('progText').textContent = 'Hoàn tất ✓';
}

/* ── STATUS ── */
function setStatus(type, msg) {
  const el = document.getElementById('statusBox');
  el.className = `status-box ${type}`;
  el.textContent = msg;
}

/* ── UTILS ── */
async function safeJson(res) {
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(_) { throw new Error(`Server trả lỗi HTTP ${res.status}`); }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ea(s) { return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function clearAll() {
  document.getElementById('urlInput').value = '';
  document.getElementById('urlCounter').textContent = '0 URL';
  document.getElementById('resultWrap').classList.remove('on');
  document.getElementById('progWrap').classList.remove('on');
  document.getElementById('statusBox').className = 'status-box';
  lastResults = [];
}
async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    const ta = document.getElementById('urlInput');
    ta.value = (ta.value ? ta.value + '\n' : '') + text;
    updateCounter();
    toast('✅ Đã dán từ clipboard');
  } catch(_) { toast('⚠️ Không đọc được clipboard'); }
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('on'), 2600);
}
</script>
</body>
</html>
